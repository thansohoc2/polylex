version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: polylex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: polylex
      POSTGRES_USER: polylex
      POSTGRES_PASSWORD: polylex
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - polylex-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U polylex -d polylex']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: polylex_redis
    restart: unless-stopped
    ports:
      - '6388:6379'
    volumes:
      - redisdata:/data
    networks:
      - polylex-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:

networks:
  polylex-net:
    driver: bridge
