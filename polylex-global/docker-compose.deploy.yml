services:
  backend:
    container_name: polylex_backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-polylex}:${POSTGRES_PASSWORD:-polylex}@shared-postgres:5434/${POSTGRES_DB:-polylex}
      REDIS_URL: redis://:REDIS1234!acbd@shared_redis:6388
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
    ports:
      - '8001:8000'
    networks:
      - shared-network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:8000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  frontend:
    container_name: polylex_frontend
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - '8002:80'
    networks:
      - shared-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
networks:
  shared-network:
    external: true
