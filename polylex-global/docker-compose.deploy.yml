services:
  postgres:
    image: postgres:16-alpine
    container_name: polylex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polylex}
      POSTGRES_USER: ${POSTGRES_USER:-polylex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polylex}
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - polylex-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-polylex} -d ${POSTGRES_DB:-polylex}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: polylex_redis
    restart: unless-stopped
    ports:
      - '6388:6379'
    volumes:
      - redisdata:/data
    networks:
      - polylex-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    container_name: polylex_backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-polylex}:${POSTGRES_PASSWORD:-polylex}@postgres:5432/${POSTGRES_DB:-polylex}
      REDIS_URL: redis://redis:6379
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
    ports:
      - '8001:8000'
    networks:
      - polylex-net
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:8000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  frontend:
    container_name: polylex_frontend
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - '8002:80'
    networks:
      - polylex-net
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
  redisdata:

networks:
  polylex-net:
    driver: bridge
