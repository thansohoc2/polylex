server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # PWA icons - must be served correctly with proper MIME types
    location /pwa-icons/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker - no cache to ensure updates
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri =404;
    }

    # Register SW - no cache
    location = /registerSW.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri =404;
    }

    # Serve static assets directly (no fallback to index.html)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html and manifest.json
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri =404;
    }
    # Truy cập bằng /youtube nhưng hiển thị nội dung youtube.html
    location = /youtube {
        try_files /youtube.html =404;
    }
    location = /manifest.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri =404;
    }

    # Health endpoint for deployment smoke checks
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # Reverse proxy API requests to backend service
    location /api/ {
        resolver 127.0.0.11 ipv6=off;
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle all other routes - fallback to index.html for SPA routing
    location / {
        try_files $uri /index.html;
    }
}
